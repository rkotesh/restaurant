<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>SPICYMIX</title>
  <meta name="description" content="Experience the journey at SPICYMIX Restaurant with our seasonal menu crafted with locally sourced ingredients.">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html"><button class="button1" id="btn1" onclick="Location.href">Home</button></a>

  <div class="container" id="reserve">
  
    <form action="#" method="post">
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email">

      <label for="date">Reservation Date:</label>
      <input type="date" id="date" name="date" required>

      <label for="time">Time:</label>
      <input type="time" id="time" name="time" required>

      <label for="guests">Number of Guests:</label>
      <select id="guests" name="guests" required>
        <option value="">Select</option>
        <option value="1">1 Person</option>
        <option value="2">2 People</option>
        <option value="3">3 People</option>
        <option value="4">4 People</option>
      </select>

      <label for="requests">Special Requests:</label>
      <textarea id="requests" name="requests" rows="3" placeholder="Eg., family Party, birthday celebration..."></textarea>

      <button type="submit" id="btn2">Reserve Table</button>
    </form>
  </div>
</body>
</html>
